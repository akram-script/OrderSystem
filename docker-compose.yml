services:
  rabbitmq:
    image: rabbitmq:management
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  order-service:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    ports:
      - '5000:8080'
    environment:
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
  inventory-service:
    build:
      context: .
      dockerfile: InventoryService/Dockerfile
    environment:
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
  notification-service:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    environment:
      - RabbitMQ__Host=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy